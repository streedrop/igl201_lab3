{% extends "base.html" %}
{% block content %}
<div class="panel card">
  <h1>Nouvelle user story</h1>
  <form method="post">
    <label for="title">Titre</label>
    <input id="title" name="title" required>

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" required></textarea>

    <label for="actor">Acteur concerné</label>
    <input id="actor" name="actor" required>

    <label for="need">Besoin</label>
    <input id="need" name="need" required>

    <label for="outcome">Résultat attendu</label>
    <textarea id="outcome" name="outcome" rows="3" required></textarea>

    <label for="project_id">Projet</label>
    <select id="project_id" name="project_id">
      {% for project in projects %}
      <option value="{{ project.id }}">{{ project.title }}</option>
      {% endfor %}
    </select>

    <label for="priority">Priorité</label>
    <select id="priority" name="priority">
      {% for p in priorities %}
      <option value="{{ p }}">{{ priority_label(p) }}</option>
      {% endfor %}
    </select>

    <button class="primary" type="submit">Enregistrer</button>
  </form>
</div>
{% endblock %}
