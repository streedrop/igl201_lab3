{% extends "base.html" %}
{% block content %}
<div class="panel card">
  <h1>{% if task %}Modifier la tâche{% else %}Nouvelle tâche{% endif %}</h1>
  <form method="post">
    <label for="title">Titre</label>
    <input id="title" name="title" required value="{{ task.title if task else '' }}">

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="5" required>{{ task.description if task else '' }}</textarea>

    <label for="priority">Priorité</label>
    <select id="priority" name="priority">
      {% for p in priorities %}
      <option value="{{ p }}" {% if task and task.priority == p %}selected{% endif %}>{{ priority_label(p) }}</option>
      {% endfor %}
    </select>

    <label for="due_date">Date limite</label>
    <input id="due_date" name="due_date" type="date" value="{{ task.due_date if task else '' }}">

    <label for="assignee_id">Responsable</label>
    <select id="assignee_id" name="assignee_id">
      <option value="">Aucun</option>
      {% for member in members %}
      <option value="{{ member.id }}" {% if task and task.assignee_id == member.id %}selected{% endif %}>{{ member.name }}</option>
      {% endfor %}
    </select>

    {% if task %}
    <label for="status">Statut</label>
    <select id="status" name="status">
      {% for key, label in statuses.items() %}
      <option value="{{ key }}" {% if task.status == key %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
    <label>
      <input type="checkbox" name="blocked" {% if task.blocked %}checked{% endif %}> Bloquée
    </label>
    <label for="block_reason">Raison du blocage</label>
    <input id="block_reason" name="block_reason" value="{{ task.block_reason if task else '' }}">
    {% endif %}

    <button class="primary" type="submit">Enregistrer</button>
  </form>
</div>
{% endblock %}
